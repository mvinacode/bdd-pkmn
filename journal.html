<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéDex — Journal</title>
  <link rel="stylesheet" href="css/styles.css?v=33">
  <link rel="stylesheet" href="css/types.css?v=33">
  <link rel="stylesheet" href="css/journal.css?v=1">
  <link rel="preconnect" href="https://mymkrfqpluimluehorby.supabase.co">
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="preconnect" href="https://raw.githubusercontent.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-ball">
          <div class="logo-ball-top"></div>
          <div class="logo-ball-middle"></div>
          <div class="logo-ball-bottom"></div>
        </div>
        <span class="logo-text">PokéDex</span>
      </a>
      <nav class="header-nav">
        <a href="index.html" class="header-nav-link">Pokédex</a>
        <a href="journal.html" class="header-nav-link active">Journal</a>
      </nav>
    </div>
  </header>

  <div class="journal-layout">
    <div class="journal-controls">
      <div class="chips-group">
        <button class="chip active" id="view-chrono">Chronologique</button>
        <button class="chip" id="view-game">Par jeu</button>
      </div>
      <div id="journal-total" class="journal-total"></div>
    </div>

    <div id="journal-loader" class="loader" hidden>
      <div class="pokeball-loader">
        <div class="pb-top"></div>
        <div class="pb-middle"><div class="pb-btn"></div></div>
        <div class="pb-bottom"></div>
      </div>
      <p>Chargement du journal…</p>
    </div>

    <div id="journal-empty" class="journal-empty" hidden>
      <div class="empty-icon">📖</div>
      <p>Aucune capture enregistrée.</p>
      <small>Ajoute des captures depuis la page Pokédex.</small>
    </div>

    <div id="journal-content" class="journal-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/utils.js?v=33"></script>
  <script src="js/config.js?v=33"></script>
  <script src="js/supabase-client.js?v=33"></script>
  <script src="js/journal.js?v=1"></script>

</body>
</html>
